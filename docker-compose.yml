version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dailydelp-db
    environment:
      POSTGRES_DB: dailydelp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: ../dailydelp
      dockerfile: Dockerfile
    container_name: dailydelp-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/dailydelp
      - DB_USER=postgres
      - DB_PASSWORD=1234
    depends_on:
      - db

  frontend:
    build: .
    container_name: dailydelp-frontend
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
